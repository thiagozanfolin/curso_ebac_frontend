<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Formulário de cadastro</h1>
    <form>
        <label for="text">Seu nome completo</label>
        <input id="text" type="Seu nome" /> <br>
        <label for="e-mail">Seu e-mail</label>
        <input id="e-mail" type="e-mail" /> <br>
        <label for="password">Sua senha</label>
        <input id="password" type="senha" /> <br><br>
        <input type="checkbox" id="checkbox-termos" /> <label for="checkbox-termos">Aceito os termos</label> <br><br><br>
        <button type="submit">
            Enviar
        </button>
        <button type="reset">
            Reset
        </button>
    </form>
</body>
</html>
