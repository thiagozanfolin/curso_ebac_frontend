<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Validação de formulário</title>
</head>
<body>
    <h1>Validação de Formulário</h1>
    <form id="myForm">
      <div class="form-group">
        <label for="numA">Número A:</label>
        <input type="number" id="numA" name="numA" required>
      </div>
      <div class="form-group">
        <label for="numB">Número B:</label>
        <input type="number" id="numB" name="numB" required>
      </div>
      <button type="submit">Enviar</button>
      <button type="button" id="resetButton">Reiniciar</button>
      <p id="message"></p>
    </form>
    <script src="./script.js"></script>
</body>
</html>
